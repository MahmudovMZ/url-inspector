name: Docker Build and Push

on:
  push:
    branches: ["main"] # Робот сработает только при пуше в ветку main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Копирует твой код на сервер GitHub

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }} # Берет логин из твоих секретов
          password: ${{ secrets.DOCKER_PASSWORD }} # Берет токен из твоих секретов

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # ЗАМЕНИ 'твой-логин' на свой реальный логин в Docker Hub ниже:
          tags: ${{ secrets.DOCKER_USERNAME }}/url-inspector:latest
